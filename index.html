<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reliable Audio Data Transfer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 600px; width: 100%; background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #bb86fc; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #333; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; background: #252525; color: #888; font-weight: bold; transition: 0.3s; }
        .tab.active { background: #333; color: #bb86fc; border-bottom: 3px solid #bb86fc; }
        .panel { display: none; }
        .panel.active { display: block; }
        textarea, input { width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; margin-bottom: 15px; font-family: monospace; box-sizing: border-box; }
        textarea { height: 120px; resize: vertical; }
        button { padding: 12px 20px; background: #bb86fc; color: #121212; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        button:hover { background: #9955e8; }
        button:disabled { background: #555; cursor: not-allowed; }
        .status { margin-top: 15px; padding: 10px; background: #2a2a2a; border-radius: 6px; text-align: center; font-family: monospace; min-height: 20px; }
        .success { color: #03dac6; }
        .error { color: #cf6679; }
        .info { color: #909090; font-size: 14px; text-align: center; margin-bottom: 15px;}
    </style>
</head>
<body>

<div class="container">
    <h1>🎵 Acoustic Data Transfer</h1>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('sender')">📤 Sender</div>
        <div class="tab" onclick="switchTab('receiver')">📥 Receiver</div>
    </div>

    <!-- SENDER PANEL -->
    <div id="sender-panel" class="panel active">
        <p class="info">Enter text or data (Max ~2KB for fast transfer). Uses 500Hz/2000Hz Square Waves.</p>
        <textarea id="tx-data" placeholder="Enter data to send...">Hello! This is a highly reliable audio data transfer. 1234567890</textarea>
        <button id="btn-send" onclick="startSending()">🔊 Send Data via Audio</button>
        <div id="tx-status" class="status">Ready to send.</div>
    </div>

    <!-- RECEIVER PANEL -->
    <div id="receiver-panel" class="panel">
        <p class="info">Keep the sender's speaker close to this device's microphone.</p>
        <button id="btn-listen" onclick="startListening()">🎤 Start Listening</button>
        <button id="btn-stop" onclick="stopListening()" style="background:#cf6679; margin-top:10px; display:none;">⏹ Stop Listening</button>
        <div id="rx-status" class="status">Waiting for signal...</div>
        <textarea id="rx-data" placeholder="Received data will appear here..." readonly style="margin-top:15px;"></textarea>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const FREQ_0 = 500;      // Frequency for bit '0'
    const FREQ_1 = 2000;     // Frequency for bit '1'
    const FREQ_SYNC = 1200;  // Preamble sync frequency
    const BIT_DURATION = 0.02; // 20ms per bit (50 bits/sec). Slow enough to be 100% reliable over air.
    const SYNC_DURATION = 1.0; // 1 second sync tone
    
    let audioCtx = null;
    let isSending = false;
    let isListening = false;
    let micStream = null;
    let analyser = null;
    let rxAnimFrame = null;

    // --- UI FUNCTIONS ---
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        
        if(tab === 'sender') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('sender-panel').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('receiver-panel').classList.add('active');
        }
        if(isSending || isListening) stopAll();
    }

    function stopAll() {
        if(isSending) { isSending = false; }
        if(isListening) { stopListening(); }
    }

    // --- CRC32 IMPLEMENTATION (For Data Integrity) ---
    const crcTable = (function() {
        let crcTable = [];
        for(let n = 0; n < 256; n++) {
            let c = n;
            for(let k = 0; k < 8; k++) {
                c = ((c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1));
            }
            crcTable[n] = c;
        }
        return crcTable;
    })();

    function crc32(str) {
        let crc = 0 ^ (-1);
        for (let i = 0; i < str.length; i++) {
            crc = (crc >>> 8) ^ crcTable[(crc ^ str.charCodeAt(i)) & 0xFF];
        }
        return (crc ^ (-1)) >>> 0;
    }

    // --- SENDER LOGIC ---
    async function startSending() {
        if(isSending) return;
        const data = document.getElementById('tx-data').value;
        if(!data) { alert("Enter some data!"); return; }

        const statusEl = document.getElementById('tx-status');
        const btn = document.getElementById('btn-send');
        
        // 1. Prepare Data: Add CRC32 checksum to the end
        const checksum = crc32(data).toString(16).padStart(8, '0');
        const fullPayload = data + "|" + checksum; // Format: data|checksum
        
        // 2. Convert to bits
        let bits = [];
        for (let i = 0; i < fullPayload.length; i++) {
            let charCode = fullPayload.charCodeAt(i);
            for (let j = 7; j >= 0; j--) {
                bits.push((charCode >> j) & 1);
            }
        }

        statusEl.textContent = `Preparing ${bits.length} bits...`;
        statusEl.className = 'status';
        btn.disabled = true;
        isSending = true;

        // 3. Setup Audio Context
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 4. Play Sync Preamble
        statusEl.textContent = "Sending Sync Preamble (1s)...";
        await playTone(FREQ_SYNC, SYNC_DURATION);

        // 5. Play Data Bits
        for (let i = 0; i < bits.length; i++) {
            if(!isSending) break;
            let freq = bits[i] === 0 ? FREQ_0 : FREQ_1;
            await playTone(freq, BIT_DURATION);
            statusEl.textContent = `Sending bit ${i + 1}/${bits.length}...`;
        }

        statusEl.textContent = "✅ Transmission Complete!";
        statusEl.className = 'status success';
        btn.disabled = false;
        isSending = false;
        if(audioCtx) audioCtx.close();
    }

    function playTone(freq, duration) {
        return new Promise(resolve => {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            
            osc.type = 'square'; // Square wave for strong harmonics
            osc.frequency.value = freq;
            
            // Prevent clicking/popping sounds
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); // Keep volume low to prevent mic distortion
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
            osc.onended = resolve;
        });
    }

    // --- RECEIVER LOGIC ---
    async function startListening() {
        if(isListening) return;
        const statusEl = document.getElementById('rx-status');
        const btnListen = document.getElementById('btn-listen');
        const btnStop = document.getElementById('btn-stop');
        
        try {
            micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
        } catch(e) {
            statusEl.textContent = "❌ Microphone access denied!";
            statusEl.className = 'status error';
            return;
        }

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(micStream);
        
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512; // 512 FFT gives good frequency resolution for our wide-band FSK
        source.connect(analyser);

        isListening = true;
        btnListen.style.display = 'none';
        btnStop.style.display = 'block';
        statusEl.textContent = "Listening for Sync Preamble (1200Hz)...";
        statusEl.className = 'status';
        
        processAudio();
    }

    function stopListening() {
        isListening = false;
        if(rxAnimFrame) cancelAnimationFrame(rxAnimFrame);
        if(micStream) micStream.getTracks().forEach(t => t.stop());
        if(audioCtx) audioCtx.close();
        
        document.getElementById('btn-listen').style.display = 'block';
        document.getElementById('btn-stop').style.display = 'none';
        document.getElementById('rx-status').textContent = "Stopped.";
    }

    // DSP Processing using FFT Bins
    let state = 'WAIT_SYNC'; // WAIT_SYNC -> READ_DATA
    let receivedBits = [];
    let bitBuffer = [];
    let bitTimer = 0;
    const SAMPLES_PER_BIT = Math.round((audioCtx ? audioCtx.sampleRate : 44100) * BIT_DURATION);
    let samplesCount = 0;

    function processAudio() {
        if(!isListening) return;
        rxAnimFrame = requestAnimationFrame(processAudio);

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);

        // Sample rate is typically 44100 or 48000. 
        // Bin width = sampleRate / fftSize (e.g., 44100 / 512 = 86.1 Hz per bin)
        const sampleRate = audioCtx.sampleRate;
        const binWidth = sampleRate / analyser.fftSize;

        // Calculate target bins
        const binSync = Math.round(FREQ_SYNC / binWidth);
        const bin0 = Math.round(FREQ_0 / binWidth);
        const bin1 = Math.round(FREQ_1 / binWidth);

        // Get magnitudes (check a small range around the target bin to account for slight mic inaccuracies)
        let magSync = getAvgMag(dataArray, binSync - 1, binSync + 1);
        let mag0 = getAvgMag(dataArray, bin0 - 1, bin0 + 1);
        let mag1 = getAvgMag(dataArray, bin1 - 1, bin1 + 1);

        const statusEl = document.getElementById('rx-status');

        if (state === 'WAIT_SYNC') {
            // If 1200Hz is significantly louder than others, we found the preamble!
            if (magSync > 150 && magSync > mag0 * 1.5 && magSync > mag1 * 1.5) {
                statusEl.textContent = "✅ Sync Detected! Receiving data...";
                state = 'READ_DATA';
                receivedBits = [];
                bitBuffer = [];
                samplesCount = 0;
            }
        } 
        else if (state === 'READ_DATA') {
            // Accumulate energy for the current bit duration
            bitBuffer.push({ m0: mag0, m1: mag1 });
            samplesCount++;

            // If we have collected enough samples for one bit
            if (samplesCount >= (SAMPLES_PER_BIT / (analyser.fftSize / 2))) { // Rough estimation of frames per bit
                // Actually, requestAnimationFrame runs at ~60fps. 
                // Let's just use a time-based approach for simplicity and accuracy in JS.
            }
            
            // Better approach: Time-based bit slicing
            let avg0 = 0, avg1 = 0;
            for(let b of bitBuffer) { avg0 += b.m0; avg1 += b.m1; }
            avg0 /= bitBuffer.length;
            avg1 /= bitBuffer.length;

            // We evaluate a bit every BIT_DURATION seconds. 
            // Since rAF is ~16ms, and BIT_DURATION is 20ms, we evaluate roughly every 1-2 frames.
            // Let's use a precise timestamp approach instead of frame counting.
        }
    }

    // --- REFINED RECEIVER LOGIC (Time-based for perfect accuracy) ---
    let lastTime = 0;
    let currentBitStart = 0;
    let bitEnergy0 = 0, bitEnergy1 = 0, bitFrames = 0;

    function processAudio() {
        if(!isListening) return;
        rxAnimFrame = requestAnimationFrame(processAudio);

        const now = performance.now();
        if(lastTime === 0) { lastTime = now; currentBitStart = now; }

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);

        const sampleRate = audioCtx.sampleRate;
        const binWidth = sampleRate / analyser.fftSize;

        const binSync = Math.round(FREQ_SYNC / binWidth);
        const bin0 = Math.round(FREQ_0 / binWidth);
        const bin1 = Math.round(FREQ_1 / binWidth);

        let magSync = getAvgMag(dataArray, binSync - 1, binSync + 1);
        let mag0 = getAvgMag(dataArray, bin0 - 1, bin0 + 1);
        let mag1 = getAvgMag(dataArray, bin1 - 1, bin1 + 1);

        const statusEl = document.getElementById('rx-status');

        if (state === 'WAIT_SYNC') {
            if (magSync > 120 && magSync > mag0 * 1.5 && magSync > mag1 * 1.5) {
                statusEl.textContent = "✅ Sync Detected! Receiving data...";
                state = 'READ_DATA';
                receivedBits = [];
                currentBitStart = now + (SYNC_DURATION * 1000); // Wait for sync to finish
                bitEnergy0 = 0; bitEnergy1 = 0; bitFrames = 0;
            }
        } 
        else if (state === 'READ_DATA') {
            if (now >= currentBitStart) {
                bitEnergy0 += mag0;
                bitEnergy1 += mag1;
                bitFrames++;
            }

            // Check if 20ms (BIT_DURATION) has passed
            if (now - currentBitStart >= (BIT_DURATION * 1000)) {
                if(bitFrames > 0) {
                    bitEnergy0 /= bitFrames;
                    bitEnergy1 /= bitFrames;
                    
                    // Decide bit based on which frequency was stronger
                    let bit = (bitEnergy1 > bitEnergy0) ? 1 : 0;
                    receivedBits.push(bit);
                    
                    statusEl.textContent = `Receiving... Bits: ${receivedBits.length}`;
                }
                
                // Reset for next bit
                currentBitStart = now;
                bitEnergy0 = 0; bitEnergy1 = 0; bitFrames = 0;

                // Check if we have a multiple of 8 bits to decode
                if (receivedBits.length % 8 === 0 && receivedBits.length > 0) {
                    tryDecode();
                }
            }
        }
        lastTime = now;
    }

    function getAvgMag(dataArray, startBin, endBin) {
        let sum = 0;
        let count = 0;
        for(let i = Math.max(0, startBin); i <= Math.min(dataArray.length - 1, endBin); i++) {
            sum += dataArray[i];
            count++;
        }
        return count > 0 ? sum / count : 0;
    }

    function tryDecode() {
        // Convert bits to bytes
        let bytes = [];
        for(let i = 0; i < receivedBits.length; i += 8) {
            if(i + 8 > receivedBits.length) break;
            let byte = 0;
            for(let j = 0; j < 8; j++) {
                byte = (byte << 1) | receivedBits[i + j];
            }
            bytes.push(byte);
        }

        let str = String.fromCharCode(...bytes);
        
        // Check if it contains our delimiter '|'
        if(str.includes('|')) {
            let parts = str.split('|');
            let data = parts[0];
            let recvChecksum = parts[1];
            
            // Verify CRC32
            let calcChecksum = crc32(data).toString(16).padStart(8, '0');
            
            if(recvChecksum === calcChecksum) {
                // SUCCESS!
                document.getElementById('rx-data').value = data;
                document.getElementById('rx-status').textContent = "✅ Data Received & Verified Perfectly!";
                document.getElementById('rx-status').className = 'status success';
                state = 'WAIT_SYNC'; // Reset for next transmission
                receivedBits = [];
            } else {
                document.getElementById('rx-status').textContent = `❌ Checksum Mismatch! (Expected ${calcChecksum}, Got ${recvChecksum}). Waiting for retry...`;
                document.getElementById('rx-status').className = 'status error';
                // Don't reset state, maybe it was a false positive delimiter. 
                // But to be safe, let's just clear and wait for a new sync.
                state = 'WAIT_SYNC'; 
                receivedBits = [];
            }
        }
    }
</script>
</body>
</html>
